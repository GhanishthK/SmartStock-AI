<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartStock AI — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEME TOKENS (HIGH-VISIBILITY) ────────────────────────── */
:root {
  --bg:        #f3f4f6; /* Slightly deeper background to make white cards pop */
  --surface:   #ffffff;
  --surface-2: #f9fafb;
  --border:    #d1d5db; /* Stronger, more visible dividing lines */
  --border-2:  #9ca3af; /* Darker hover borders */
  
  /* Text Contrast significantly increased */
  --text-1:    #030712; /* Almost pure black for primary text */
  --text-2:    #1f2937; /* Highly readable dark gray for secondary */
  --text-3:    #4b5563; /* Much darker tertiary text (was too light before) */
  
  --accent:    #111827;
  --accent-fg: #ffffff;
  
  /* Richer badge backgrounds and borders */
  --green:     #059669;
  --green-bg:  #d1fae5; 
  --green-bd:  #6ee7b7;
  --red:       #dc2626;
  --red-bg:    #fee2e2;
  --red-bd:    #fca5a5;
  --amber:     #d97706;
  --amber-bg:  #fef3c7;
  --amber-bd:  #fcd34d;
  --blue:      #2563eb;
  --blue-bg:   #dbeafe;
  --blue-bd:   #93c5fd;
  
  /* Stronger shadows for better depth perception */
  --sh:        0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.08);
  --sh-md:     0 4px 6px -1px rgba(0, 0, 0, 0.15), 0 2px 4px -1px rgba(0, 0, 0, 0.08);
  --sh-lg:     0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.08);
  
  /* Layout vars */
  --sidebar-w: 240px;
  --topbar-h:  60px;
  --radius:    10px;
  --r:         10px;
}
[data-theme="dark"] {
  --bg:        #020617;
  --surface:   #0f172a;
  --border:    #334155;
  --border-2:  #475569;
  --text-1:    #f8fafc;
  --text-2:    #cbd5e1;
  --text-3:    #94a3b8;
  --accent-bg: #f8fafc;
  --accent-fg: #0f172a;
  --err-bg:    #4c0519;
  --err-bd:    #881337;
  --err-tx:    #fb7185;
  --ok-bg:     #064e3b;
  --ok-bd:     #065f46;
  --ok-tx:     #34d399;
  --sh:        0 1px 3px rgba(0,0,0,.4);
  --sh-lg:     0 15px 30px -5px rgba(0,0,0,.6);
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}

.theme-btn {
  position: fixed; top: 24px; right: 24px;
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; box-shadow: var(--sh);
}
.theme-btn:hover { color: var(--text-1); border-color: var(--border-2); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 38px 40px;
  width: 400px;
  box-shadow: var(--sh-lg);
  animation: up .3s cubic-bezier(.16,1,.3,1);
}
@keyframes up {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 30px;
}
.logo-mark {
  width: 34px; height: 34px;
  background: var(--text-1);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 16px; color: var(--bg);
  flex-shrink: 0; transition: background .2s;
}
.logo-text {
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
  font-size: 19px; color: var(--text-1);
}

h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px; font-weight: 700;
  color: var(--text-1); letter-spacing: -.02em;
  margin-bottom: 8px;
}
.sub {
  font-size: 14px; color: var(--text-2);
  margin-bottom: 32px; line-height: 1.5;
}

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 12px; font-weight: 600; letter-spacing: .05em;
  text-transform: uppercase; color: var(--text-2);
  margin-bottom: 8px;
}
.inp-wrap { position: relative; }
.inp-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 13px 11px 38px;
  font-family: 'Inter', sans-serif;
  font-size: 14.5px; color: var(--text-1);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.inp-wrap input:focus {
  border-color: var(--text-1);
  box-shadow: 0 0 0 3px rgba(15,23,42,.1);
}
[data-theme="dark"] .inp-wrap input:focus { box-shadow: 0 0 0 3px rgba(248,250,252,.1); }
.inp-wrap input::placeholder { color: var(--text-3); }
.inp-wrap .ic {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); font-size: 13px; pointer-events: none;
}
.eye {
  position: absolute; right: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); font-size: 13px; cursor: pointer;
  transition: color .15s;
}
.eye:hover { color: var(--text-2); }

.btn {
  width: 100%; padding: 12px;
  background: var(--accent-bg); color: var(--accent-fg);
  border: none; border-radius: 9px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity .15s, transform .15s;
  margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

.divider {
  display: flex; align-items: center; gap: 14px;
  margin: 24px 0 20px;
}
.divider-line { flex:1; height:1px; background:var(--border); }
.divider span { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: .06em; }

.link {
  display: block; text-align: center;
  font-size: 14px; font-weight: 500; color: var(--text-2);
  cursor: pointer; transition: color .15s;
  text-decoration: underline;
  text-underline-offset: 4px;
  text-decoration-color: var(--border-2);
}
.link:hover { color: var(--text-1); }

.msg {
  display: none; margin-top: 16px;
  padding: 11px 14px; border-radius: 9px;
  font-size: 13.5px; font-weight: 500;
  align-items: center; gap: 10px; line-height: 1.4;
}
.msg.show { display: flex; animation: fi .2s ease; }
.msg.error   { background:var(--err-bg); border:1px solid var(--err-bd); color:var(--err-tx); }
.msg.success { background:var(--ok-bg);  border:1px solid var(--ok-bd);  color:var(--ok-tx); }
@keyframes fi { from{opacity:0;transform:translateY(-2px)} to{opacity:1;transform:translateY(0)} }

.spinner {
  width:14px; height:14px;
  border:2px solid rgba(128,128,128,.3);
  border-top-color: currentColor;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

footer {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--text-3); font-weight: 500; white-space: nowrap;
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <i id="themeIcon" class="fas fa-moon"></i>
</button>

<div class="card">
  <div class="logo">
    <div class="logo-mark">S</div>
    <span class="logo-text">SmartStock AI</span>
  </div>

  <h1 id="title">Welcome back</h1>
  <p class="sub" id="sub">Sign in to access your inventory dashboard.</p>

  <div class="field">
    <label>Username</label>
    <div class="inp-wrap">
      <i class="fas fa-user ic"></i>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="inp-wrap">
      <i class="fas fa-lock ic"></i>
      <input type="password" id="password" placeholder="Enter your password">
      <span class="eye" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></span>
    </div>
  </div>

  <button class="btn" id="actionBtn" onclick="go('login')">Sign In</button>

  <div class="msg" id="msgBox">
    <i class="fas fa-circle-info"></i>
    <span id="msgTxt"></span>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span>OR</span>
    <div class="divider-line"></div>
  </div>

  <span class="link" onclick="toggle()" id="toggleBtn">Request staff access</span>
</div>

<footer>SmartStock AI &nbsp;&middot;&nbsp; v2.0 &nbsp;&middot;&nbsp; Final Year Project</footer>

<script>
const API = "http://127.0.0.1:8000";
let isLogin = true;

// Theme
(function() {
  const t = localStorage.getItem("ss-theme") || "light";
  applyTheme(t);
})();

function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeIcon").className = t === "dark" ? "fas fa-sun" : "fas fa-moon";
  localStorage.setItem("ss-theme", t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
}

function togglePw() {
  const i = document.getElementById("password");
  const e = document.getElementById("eyeIcon");
  i.type = i.type === "password" ? "text" : "password";
  e.className = i.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
}

function toggle() {
  isLogin = !isLogin;
  clearMsg();
  if (isLogin) {
    document.getElementById("title").textContent = "Welcome back";
    document.getElementById("sub").textContent = "Sign in to access your inventory dashboard.";
    document.getElementById("actionBtn").textContent = "Sign In";
    document.getElementById("actionBtn").setAttribute("onclick", "go('login')");
    document.getElementById("toggleBtn").textContent = "Request staff access";
  } else {
    document.getElementById("title").textContent = "Create account";
    document.getElementById("sub").textContent = "Request staff access — an admin will approve you.";
    document.getElementById("actionBtn").textContent = "Submit Request";
    document.getElementById("actionBtn").setAttribute("onclick", "go('signup')");
    document.getElementById("toggleBtn").textContent = "Already have an account? Sign in";
  }
}

function showMsg(txt, type) {
  const b = document.getElementById("msgBox");
  b.className = `msg ${type} show`;
  document.getElementById("msgTxt").textContent = txt;
}
function clearMsg() { document.getElementById("msgBox").className = "msg"; }

function setLoading(on) {
  const b = document.getElementById("actionBtn");
  b.disabled = on;
  b.innerHTML = on
    ? '<span class="spinner"></span> Please wait…'
    : (isLogin ? "Sign In" : "Submit Request");
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") go(isLogin ? "login" : "signup");
});

async function go(action) {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  if (!u || !p) return showMsg("Please fill in all fields.", "error");
  setLoading(true); clearMsg();
  try {
    const r = await fetch(`${API}/${action}/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p })
    });
    const d = await r.json();
    if (d.success && action === "login") {
      showMsg("Access granted. Redirecting…", "success");
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("role", d.role);
      localStorage.setItem("username", u);
      setTimeout(() => window.location.href = "index.html", 700);
    } else {
      showMsg(d.message, d.success ? "success" : "error");
    }
  } catch {
    showMsg("Cannot connect to server. Is it running?", "error");
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
